<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(40, 30)">
    <path d="M50 0 L90 25 L90 75 L50 100 L10 75 L10 25 Z" fill="none" stroke="#2c3e50" stroke-width="2" opacity="0.3"/>
    
    <path d="M50 10 L85 35 L50 60 L15 35 Z" fill="url(#mainGrad)" filter="url(#glow)">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M50 90 L85 65 L50 40 L15 65 Z" fill="#1a2a6c" opacity="0.8"/>
    
    <circle cx="50" cy="50" r="8" fill="#fff" filter="url(#glow)"/>
  </g>

  <g transform="translate(160, 85)">
    <text font-family="Verdana, Geneva, sans-serif" font-weight="900" font-size="52" fill="#1a2a6c" letter-spacing="-2">
      ALFRED
    </text>
    <text x="2" y="30" font-family="Verdana, Geneva, sans-serif" font-size="14" font-weight="bold" fill="#4facfe" letter-spacing="10">
      SYSTEMS
    </text>
    <rect x="0" y="45" width="220" height="4" fill="url(#mainGrad)" rx="2"/>
  </g>
</svg>